name: omnimind
description: OmniMind — AI-Powered Mental Health Companion

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^5.1.0

  # State management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.1

# Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  flutter_markdown: ^0.6.18
  cached_network_image: ^3.3.1

  # Local storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  timeago: ^3.6.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.0

  # Charts / Progress
  syncfusion_flutter_charts: ^25.1.38
  timeline_tile: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/audio/
    - assets/lottie/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
  #  - family: Poppins
  #    fonts:
  #      - asset: assets/fonts/Poppins-Regular.ttf
  #      - asset: assets/fonts/Poppins-Medium.ttf
  #        weight: 500
  #      - asset: assets/fonts/Poppins-SemiBold.ttf
  #        weight: 600
  #      - asset: assets/fonts/Poppins-Bold.ttf
  #        weight: 700
